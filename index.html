<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning English</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&display=swap" rel="stylesheet">
</head>
<body class="selection:bg-violet-500/30">

    <header class="fixed inset-x-0 top-0 z-50 py-4">
        <nav class="flex justify-center">
            <div class="px-6 py-2 rounded-full bg-white/5 border border-white/10 backdrop-blur-md">
                <span class="text-sm font-medium tracking-widest uppercase">
                    Study <span class="text-aquamarine-400">Mode</span>
                </span>
            </div>
        </nav>
    </header>

    <main class="relative pt-24 pb-12">
        <div class="max-w-3xl mx-auto px-6">
            
            <header class="text-center mb-12">
                <h1 class="text-4xl font-bold tracking-tight sm:text-5xl mb-2">
                    Hola, <span class="text-violet-400">Chinita</span> ✨
                </h1>
                <p class="text-gray-400 text-sm italic font-light">¿Qué vamos a aprender hoy?</p>
            </header>

            <section id="ia-tool" class="relative">
                <div class="absolute -z-10 inset-0 bg-violet-600/10 blur-[100px] rounded-full"></div>
                
                <div class="glass-focus rounded-3xl p-6 sm:p-10 shadow-2xl">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="h-2 w-2 rounded-full bg-aquamarine-400 animate-pulse"></div>
                        <span class="text-xs font-bold uppercase tracking-widest text-gray-400">Tu IA amiga está online</span>
                    </div>

                    <div id="chat-container" class="min-h-[200px] mb-8 flex flex-col gap-4 overflow-y-auto max-h-[400px] pr-2">
                        <div class="bg-white/5 border border-white/10 rounded-2xl p-5 ml-auto max-w-[80%] glass-focus">
                            <p class="text-aquamarine-400 text-xs font-bold mb-1">Teacher AI</p>
                            <p class="text-gray-200">
                                ¡Hi! Soy tu profesor personal. Puedo explicarte gramática con ejemplos de café o juegos, armarte tablas comparativas y recordar lo que hablamos. ¿Qué duda tenés?
                            </p>
                        </div>
                    </div>

                    <div class="relative flex items-center">
                        <input type="text" id="user-input" 
                            placeholder="Ej: Explicame el Present Continuous con ejemplos de League of Legends..." 
                            class="w-full bg-black/40 border border-white/10 rounded-2xl px-6 py-4 pr-16 text-white focus:border-violet-500/50 transition-all"
                            onkeypress="if(event.key === 'Enter') enviarConsulta()">
                        
                        <button onclick="enviarConsulta()" class="absolute right-2 p-2 text-violet-400 hover:text-aquamarine-400 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" />
                            </svg>
                        </button>
                    </div>
                </div>
            </section>

           <footer class="mt-12 grid grid-cols-2 gap-4">
    <button onclick="toggleModal('modal-notas')" class="p-4 rounded-2xl border border-white/5 bg-white/5 hover:bg-white/10 transition-all text-sm font-medium text-gray-300">
        📚 Mis Notas
    </button>
    <button onclick="toggleModal('modal-random'); nuevaPalabra()" class="p-4 rounded-2xl border border-white/5 bg-white/5 hover:bg-white/10 transition-all text-sm font-medium text-gray-300">
        🎲 Palabra Random
    </button>
</footer>
        </div>
    </main>

    <div id="modal-notas" class="fixed inset-0 z-[60] hidden flex items-center justify-center p-6 bg-black/60 backdrop-blur-md">
    <div class="glass-focus w-full max-w-lg rounded-3xl p-8 relative">
        <button onclick="toggleModal('modal-notas')" class="absolute top-4 right-4 text-gray-400 hover:text-white">✕</button>
        <h3 class="text-xl font-bold text-violet-400 mb-4">Mis Notas de Estudio</h3>
        <textarea id="texto-notas" class="w-full h-64 bg-black/20 border border-white/10 rounded-2xl p-4 text-white focus:outline-none" placeholder="Anotá frases, reglas gramaticales..."></textarea>
        <button onclick="guardarNotas()" class="mt-4 w-full bg-violet-600 py-3 rounded-xl font-bold hover:bg-violet-500 transition-all">Guardar Notas</button>
    </div>
    </div>

    <div id="modal-random" class="fixed inset-0 z-[60] hidden flex items-center justify-center p-6 bg-black/60 backdrop-blur-md">
        <div class="glass-focus w-full max-w-sm rounded-3xl p-10 text-center relative">
            <button onclick="toggleModal('modal-random')" class="absolute top-4 right-4 text-gray-400 hover:text-white">✕</button>
            <div id="word-content">
                <h3 id="random-word" class="text-4xl font-bold text-aquamarine-400 mb-2 underline decoration-violet-500">...</h3>
                <p id="random-translation" class="text-gray-300 italic mb-6">Traducción</p>
                <button onclick="nuevaPalabra()" class="text-xs uppercase tracking-widest text-violet-400 hover:text-white transition-colors">¿Otra palabra?</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
